<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cos Plot XR</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #050a18;
        color: #f4f8ff;
        font-family: system-ui, sans-serif;
      }

      #info {
        position: absolute;
        left: 1rem;
        right: 1rem;
        top: 1rem;
        z-index: 10;
        padding: 0.9rem 1rem;
        background: rgba(2, 8, 25, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 0.85rem;
        line-height: 1.55;
        font-size: 0.95rem;
      }

      #info strong {
        display: block;
        margin-bottom: 0.4rem;
        font-size: 1.05rem;
      }

      #sliderContainer {
        margin-top: 0.8rem;
        display: flex;
        gap: 0.6rem;
        align-items: center;
      }

      #sliderLabel {
        min-width: 50px;
        font-size: 0.9rem;
        font-weight: 500;
      }

      input[type='range'] {
        flex: 1;
        height: 6px;
        border-radius: 3px;
        background: #1a3a5c;
        outline: none;
        -webkit-appearance: none;
      }

      input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #88c8ff;
        cursor: pointer;
        box-shadow: 0 0 8px rgba(136, 200, 255, 0.6);
      }

      input[type='range']::-moz-range-thumb {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #88c8ff;
        cursor: pointer;
        border: none;
        box-shadow: 0 0 8px rgba(136, 200, 255, 0.6);
      }

      #xValue {
        min-width: 60px;
        text-align: right;
        font-family: monospace;
        font-size: 0.9rem;
        color: #ffd568;
      }

      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="info">
      <strong>Cos Plot XR</strong>
      <div id="sliderContainer">
        <span id="sliderLabel">A:</span>
        <input type="range" id="aSlider" min="-5" max="5" step="0.01" value="1" />
        <span id="aValue">1.00</span>
      </div>
      <div id="sliderContainer" style="margin-top:0.4rem;">
        <span id="sliderLabel">B:</span>
        <input type="range" id="bSlider" min="0" max="5" step="0.01" value="1" />
        <span id="bValue">1.00</span>
      </div>
      <div id="functionText" style="margin-top:0.6rem; font-family: monospace; color: #ffd568;">y = 1.00 * cos(1.00 * x)</div>
      <p style="margin-top: 0.6rem; margin-bottom: 0;">Viene mostrato un grafico 3D del coseno con assi x, y e z. Usa un controller VR connesso e il grilletto select per ruotare e spostare il gruppo di assi.</p>
    </div>
    <script type="module">
      import * as THREE from '../vendor/three/build/three.module.js';
      import { VRButton } from '../vendor/three/examples/jsm/webxr/VRButton.js';

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      renderer.xr.setReferenceSpaceType('local');
      document.body.appendChild(renderer.domElement);
      document.body.appendChild(VRButton.createButton(renderer));

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050a18);

      const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 100);
      camera.position.set(0, 1.8, 4);

      const ambientLight = new THREE.HemisphereLight(0xffffff, 0x202035, 0.9);
      scene.add(ambientLight);
      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(5, 7, 5);
      scene.add(directionalLight);

      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(10, 10),
        new THREE.MeshStandardMaterial({ color: 0x081025, roughness: 0.95, metalness: 0.05 })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = 0;
      scene.add(floor);

      const grid = new THREE.GridHelper(8, 16, 0x204b8a, 0x10203a);
      grid.position.y = 0.001;
      scene.add(grid);

      const axesGroup = new THREE.Group();
      axesGroup.position.set(0, 1.25, -0.5);
      scene.add(axesGroup);

      let cosCurve = null;
      let amplitude = 1.0;
      let frequency = 1.0;

      createAxes();
      cosCurve = createCosCurve(amplitude, frequency);

      const sliderGroup = createVRSlider();
      scene.add(sliderGroup);
      updateSliderThumbs();
      updateFunctionText();

      const controllers = [createController(0), createController(1)];
      controllers.forEach((controller) => scene.add(controller));

      const raycaster = new THREE.Raycaster();
      const tempMatrix = new THREE.Matrix4();
      let selectedController = null;
      let selectedMode = null;
      const controllerStartQuat = new THREE.Quaternion();
      const axesStartQuat = new THREE.Quaternion();
      const controllerStartPos = new THREE.Vector3();
      const axesStartPos = new THREE.Vector3();
      let sliderStartX = 0;
      let sliderStartOffset = 0;

      const aSlider = document.getElementById('aSlider');
      const aValue = document.getElementById('aValue');
      aSlider.addEventListener('input', onSliderChange);
      const bSlider = document.getElementById('bSlider');
      const bValue = document.getElementById('bValue');
      bSlider.addEventListener('input', onSliderChange);

      window.addEventListener('resize', onWindowResize);
      renderer.setAnimationLoop(render);

      function onSliderChange(event) {
        amplitude = parseFloat(aSlider.value);
        frequency = parseFloat(bSlider.value);
        aValue.textContent = amplitude.toFixed(2);
        bValue.textContent = frequency.toFixed(2);
        updateCosCurve();
        updateSliderThumbs();
        updateFunctionText();
      }

      function updateCosCurve() {
        if (cosCurve) {
          axesGroup.remove(cosCurve);
        }
        cosCurve = createCosCurve(amplitude, frequency);
      }

      

      function createAxes() {
        const material = new THREE.MeshStandardMaterial({ color: 0x88c8ff, roughness: 0.3, metalness: 0.2 });
        const length = 3.0;
        const thickness = 0.03;

        const xAxis = new THREE.Mesh(new THREE.CylinderGeometry(thickness, thickness, length, 12), material);
        xAxis.rotation.z = -Math.PI / 2;
        xAxis.position.x = length / 2;
        axesGroup.add(xAxis);

        const yAxis = new THREE.Mesh(new THREE.CylinderGeometry(thickness, thickness, length, 12), material);
        yAxis.position.y = length / 2;
        axesGroup.add(yAxis);

        const zAxis = new THREE.Mesh(new THREE.CylinderGeometry(thickness, thickness, length, 12), material);
        zAxis.rotation.x = Math.PI / 2;
        zAxis.position.z = length / 2;
        axesGroup.add(zAxis);

        const arrow = new THREE.ConeGeometry(0.08, 0.26, 16);
        const xArrow = new THREE.Mesh(arrow, material);
        xArrow.rotation.z = -Math.PI / 2;
        xArrow.position.set(length, 0, 0);
        axesGroup.add(xArrow);

        const yArrow = new THREE.Mesh(arrow, material);
        yArrow.position.set(0, length, 0);
        axesGroup.add(yArrow);

        const zArrow = new THREE.Mesh(arrow, material);
        zArrow.rotation.x = Math.PI / 2;
        zArrow.position.set(0, 0, length);
        axesGroup.add(zArrow);

        axesGroup.add(createLabel('X', length + 0.2, 0, 0));
        axesGroup.add(createLabel('Y', 0, length + 0.2, 0));
        axesGroup.add(createLabel('Z', 0, 0, length + 0.2));
      }

      function createLabel(text, x, y, z) {
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'rgba(5, 9, 24, 0.0)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = 'bold 70px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#ccf6ff';
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);

        const texture = new THREE.CanvasTexture(canvas);
        texture.encoding = THREE.sRGBEncoding;

        const label = new THREE.Mesh(
          new THREE.PlaneGeometry(0.4, 0.2),
          new THREE.MeshBasicMaterial({ map: texture, transparent: true })
        );
        label.position.set(x, y, z);
        label.lookAt(camera.position);
        return label;
      }

      function createCosCurve(A, B) {
        const points = [];
        const start = -Math.PI * 4;
        const end = Math.PI * 4;
        const step = 0.08;
        for (let x = start; x <= end; x += step) {
          points.push(new THREE.Vector3(x * 0.28, A * Math.cos(B * x) * 0.7, 0));
        }

        const curveGeometry = new THREE.BufferGeometry().setFromPoints(points);
        const curveMaterial = new THREE.LineBasicMaterial({ color: 0xffd568, linewidth: 2 });
        const curve = new THREE.Line(curveGeometry, curveMaterial);
        curve.position.y = 0.02;
        axesGroup.add(curve);
        return curve;
      }

      function createController(index) {
        const controller = renderer.xr.getController(index);
        controller.addEventListener('selectstart', onSelectStart);
        controller.addEventListener('selectend', onSelectEnd);

        const ray = new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, -1)]),
          new THREE.LineBasicMaterial({ color: 0x88c8ff })
        );
        ray.name = 'ray';
        ray.scale.z = 6;
        controller.add(ray);

        const pointer = new THREE.Mesh(
          new THREE.SphereGeometry(0.015, 16, 12),
          new THREE.MeshBasicMaterial({ color: 0x88c8ff, opacity: 0.9, transparent: true })
        );
        pointer.position.set(0, 0, -1);
        controller.add(pointer);

        return controller;
      }

      function onSelectStart(event) {
        const controller = event.target;
        const intersections = getControllerIntersections(controller);
        if (intersections.length) {
          const hitObject = intersections[0].object;
          if (hitObject.name === 'aThumb' || hitObject.name === 'aTrack') {
            selectedMode = 'vrSliderA';
            selectedController = controller;
          } else if (hitObject.name === 'bThumb' || hitObject.name === 'bTrack') {
            selectedMode = 'vrSliderB';
            selectedController = controller;
          } else {
            selectedMode = 'transform';
            selectedController = controller;
            controllerStartQuat.copy(controller.quaternion);
            axesStartQuat.copy(axesGroup.quaternion);
            controllerStartPos.setFromMatrixPosition(controller.matrixWorld);
            axesStartPos.copy(axesGroup.position);
          }
        }
      }

      function onSelectEnd() {
        selectedController = null;
        selectedMode = null;
      }

      function getControllerIntersections(controller) {
        tempMatrix.identity().extractRotation(controller.matrixWorld);
        raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
        raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
        return raycaster.intersectObjects(sliderGroup.children, true).concat(raycaster.intersectObjects(axesGroup.children, true));
      }

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      function render() {
        if (selectedController && selectedMode === 'transform') {
          const currentQuat = selectedController.quaternion.clone();
          const deltaQuat = currentQuat.multiply(controllerStartQuat.clone().invert());
          axesGroup.quaternion.copy(axesStartQuat).premultiply(deltaQuat);

          const currentPos = new THREE.Vector3().setFromMatrixPosition(selectedController.matrixWorld);
          const deltaPos = currentPos.clone().sub(controllerStartPos);
          axesGroup.position.copy(axesStartPos).add(deltaPos);
        } else if (selectedController && (selectedMode === 'vrSliderA' || selectedMode === 'vrSliderB')) {
          tempMatrix.identity().extractRotation(selectedController.matrixWorld);
          raycaster.ray.origin.setFromMatrixPosition(selectedController.matrixWorld);
          raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
          const sliderIntersections = raycaster.intersectObjects(sliderGroup.children, true);
          if (sliderIntersections.length) {
            const point = sliderIntersections[0].point;
            const minX = -3.14;
            const maxX = 3.14;
            const trackLength = maxX - minX;
            const normalized = (point.x - minX) / trackLength;
            if (selectedMode === 'vrSliderA') {
              const minA = -5.0;
              const maxA = 5.0;
              amplitude = minA + normalized * (maxA - minA);
              amplitude = Math.max(minA, Math.min(maxA, amplitude));
              aSlider.value = amplitude;
              aValue.textContent = amplitude.toFixed(2);
              updateCosCurve();
              updateSliderThumbs();
              updateFunctionText();
            } else {
              const minB = 0.0;
              const maxB = 5.0;
              frequency = minB + normalized * (maxB - minB);
              frequency = Math.max(minB, Math.min(maxB, frequency));
              bSlider.value = frequency;
              bValue.textContent = frequency.toFixed(2);
              updateCosCurve();
              updateSliderThumbs();
              updateFunctionText();
            }
          }
        }
        renderer.render(scene, camera);
      }

      function updateFunctionText() {
        const el = document.getElementById('functionText');
        if (el) {
          el.textContent = `y = ${amplitude.toFixed(2)} * cos(${frequency.toFixed(2)} * x)`;
        }
      }

      function createVRSlider() {
        const group = new THREE.Group();
        group.position.set(0, 0.5, 0.2);

        const minX = -3.14;
        const maxX = 3.14;
        const trackLength = maxX - minX;

        // A track (amplitude)
        const trackAGeom = new THREE.BoxGeometry(trackLength, 0.06, 0.06);
        const trackMat = new THREE.MeshStandardMaterial({ color: 0x1a3a5c, roughness: 0.8, metalness: 0.2 });
        const trackA = new THREE.Mesh(trackAGeom, trackMat);
        trackA.name = 'aTrack';
        trackA.position.set((minX + maxX) / 2, 0.02, 0);
        group.add(trackA);

        const thumbGeom = new THREE.BoxGeometry(0.18, 0.15, 0.15);
        const thumbMat = new THREE.MeshStandardMaterial({ color: 0x88c8ff, roughness: 0.3, metalness: 0.6, emissive: 0x44a0ff, emissiveIntensity: 0.3 });
        const aThumb = new THREE.Mesh(thumbGeom, thumbMat);
        aThumb.name = 'aThumb';
        aThumb.position.set(0, 0.02, 0);
        group.add(aThumb);

        // B track (frequency) slightly below
        const trackB = new THREE.Mesh(trackAGeom.clone(), trackMat.clone());
        trackB.name = 'bTrack';
        trackB.position.set((minX + maxX) / 2, -0.18, 0);
        group.add(trackB);

        const bThumb = new THREE.Mesh(thumbGeom.clone(), thumbMat.clone());
        bThumb.name = 'bThumb';
        bThumb.position.set(0, -0.18, 0);
        group.add(bThumb);

        return group;
      }

      function updateSliderThumbs() {
        const aThumb = sliderGroup.getObjectByName('aThumb');
        const bThumb = sliderGroup.getObjectByName('bThumb');
        const minX = -3.14;
        const maxX = 3.14;
        const trackLength = maxX - minX;
        if (aThumb) {
          const normalizedA = (amplitude - (-5.0)) / (5.0 - (-5.0));
          aThumb.position.x = minX + normalizedA * trackLength;
        }
        if (bThumb) {
          const normalizedB = frequency / 5.0;
          bThumb.position.x = minX + normalizedB * trackLength;
        }
      }
    </script>
  </body>
</html>

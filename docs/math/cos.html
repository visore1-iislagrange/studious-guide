<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cos Plot XR</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap');

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body, html {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #0a0e18;
        color: #e8f4ff;
        font-family: 'JetBrains Mono', monospace;
      }

      #screenPanel {
        position: absolute;
        left: 1.2rem; top: 1.2rem;
        width: 340px;
        z-index: 10;
        border-radius: 16px;
        overflow-y: auto;
        max-height: calc(100vh - 2.4rem);
        background: rgba(10, 14, 24, 0.93);
        border: 1px solid rgba(147, 112, 219, 0.3);
        backdrop-filter: blur(30px) saturate(1.8);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      #screenPanel::before {
        content: ''; display: block; height: 3px;
        background: #8b5cf6;
      }

      .panel-inner { padding: 1rem; }
      .ph { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.8rem; }
      .ph-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.95rem; color: #a78bfa; letter-spacing: 0.04em; text-transform: uppercase; }
      .ph-sub { font-size: 0.65rem; color: rgba(167, 139, 250, 0.45); }
      
      .sec-label { font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(34, 197, 94, 0.6); margin-bottom: 0.5rem; margin-top: 0.8rem; }

      .sr { display: grid; grid-template-columns: 24px 1fr 46px; gap: 0.4rem; align-items: center; margin-bottom: 0.5rem; }
      .sn { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.8rem; text-align: center; }
      .sn.a  { color: #c084fc; }
      .sn.b  { color: #22c55e; }
      .sv { font-size: 0.72rem; text-align: right; color: rgba(180, 220, 255, 0.6); }

      input[type='range'] {
        -webkit-appearance: none; width: 100%; height: 4px; border-radius: 2px; background: rgba(30, 40, 70, 0.8); outline: none;
      }
      #aSlider { background: linear-gradient(90deg, rgba(139, 92, 246, 0.5) var(--pct,50%), rgba(30, 40, 70, 0.8) var(--pct,50%)); }
      #bSlider { background: linear-gradient(90deg, rgba(34, 197, 94, 0.5) var(--pct,50%), rgba(30, 40, 70, 0.8) var(--pct,50%)); }
      input[type='range']::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:#a78bfa; cursor:pointer; box-shadow: 0 0 6px rgba(167, 139, 250, 0.5); }
      input[type='range']::-moz-range-thumb { width:14px; height:14px; border-radius:50%; background:#a78bfa; cursor:pointer; border: none; box-shadow: 0 0 6px rgba(167, 139, 250, 0.5); }

      .div { height: 1px; background: rgba(147, 112, 219, 0.2); margin: 0.8rem 0; }

      .cam-pad { display: flex; align-items: center; justify-content: center; margin: 0.5rem auto 0; width: 110px; height: 110px; position: relative; }
      .cam-btn {
        position: absolute; background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.35);
        color: #60a5fa; font-size: 0.85rem; width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
      .cam-up { top: 0; left: 41px; } .cam-down { bottom: 0; left: 41px; }
      .cam-left { left: 0; top: 41px; } .cam-right { right: 0; top: 41px; }
      .cam-z-in { right: 0; top: 0; font-weight: bold; } .cam-z-out { left: 0; top: 0; font-weight: bold; }
      .cam-center { position: absolute; top: 38px; left: 38px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; background: rgba(34, 197, 94, 0.12); border: 1px solid rgba(34, 197, 94, 0.35); border-radius: 50%; color: #22c55e; }

      .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 0.6rem; }
      .act-btn {
        background: rgba(59, 130, 246, 0.08); border: 1px solid rgba(59, 130, 246, 0.25); border-radius: 6px;
        padding: 0.45rem; color: #60a5fa; font-family: 'Space Grotesk', sans-serif; font-size: 0.68rem; font-weight: bold;
        text-align: center; cursor: pointer; text-transform: uppercase;
      }
      .act-btn.active { background: rgba(139, 92, 246, 0.25); border-color: #a78bfa; color: #fff; box-shadow: 0 0 10px rgba(167, 139, 250, 0.3); }

      canvas { display: block; }
    </style>
  </head>
  <body>

    <div id="screenPanel">
      <div class="panel-inner">
        <div class="ph">
          <div class="ph-title">Cos Plot XR</div>
          <div class="ph-sub">Pavlyk, Yu, Hu</div>
        </div>

        <div class="div"></div>
        <div class="sec-label">Parametri Dinamici</div>
        <div class="sr"><span class="sn a">A</span><input type="range" id="aSlider" min="-5" max="5" step="0.1" value="1" /><span class="sv" id="aValue">1.0</span></div>
        <div class="sr"><span class="sn b">B</span><input type="range" id="bSlider" min="0" max="5" step="0.1" value="1" /><span class="sv" id="bValue">1.0</span></div>

        <div style="margin-top: 0.8rem; font-family: monospace; font-size: 0.85rem; color: #a78bfa;">y = <span id="functionDisplay">1.0</span> · cos(<span id="frequencyDisplay">1.0</span> · x)</div>

        <div class="div"></div>
        <div class="sec-label" style="text-align: center;">Muovi Visuale (Camera)</div>
        <div class="cam-pad">
          <button class="cam-btn cam-up" id="camUp">▲</button>
          <button class="cam-btn cam-down" id="camDown">▼</button>
          <button class="cam-btn cam-left" id="camLeft">◀</button>
          <button class="cam-btn cam-right" id="camRight">▶</button>
          <button class="cam-btn cam-z-in" id="camZIn">＋</button>
          <button class="cam-btn cam-z-out" id="camZOut">─</button>
          <div class="cam-center">📷</div>
        </div>

        <div class="div"></div>
        <p style="font-size: 0.75rem; color: rgba(167, 139, 250, 0.6); line-height: 1.4; margin: 0.6rem 0;">Viene mostrato un grafico 3D del coseno. Usa i controller VR per trascinare i cursori e gli assi. Accedi ai controlli della camera per muoverti nello spazio.</p>
      </div>
    </div>
    <script type="module">
      import * as THREE from '../vendor/three/build/three.module.js';
      import { VRButton } from '../vendor/three/examples/jsm/webxr/VRButton.js';

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      renderer.xr.setReferenceSpaceType('local');
      document.body.appendChild(renderer.domElement);
      document.body.appendChild(VRButton.createButton(renderer));

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0e18);

      const playerRig = new THREE.Group();
      scene.add(playerRig);
      const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 100);
      camera.position.set(0, 1.8, 4);
      playerRig.add(camera);

      const ambientLight = new THREE.HemisphereLight(0xffffff, 0x202035, 0.9);
      scene.add(ambientLight);
      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(5, 7, 5);
      scene.add(directionalLight);

      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(10, 10),
        new THREE.MeshStandardMaterial({ color: 0x081025, roughness: 0.95, metalness: 0.05 })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = 0;
      scene.add(floor);

      const grid = new THREE.GridHelper(8, 16, 0x204b8a, 0x10203a);
      grid.position.y = 0.001;
      scene.add(grid);

      const axesGroup = new THREE.Group();
      axesGroup.position.set(0, 1.4, -2.8);
      scene.add(axesGroup);

      let cosCurve = null;
      let amplitude = 1.0;
      let frequency = 1.0;
      let activeDragMode = null;

      createAxes();
      cosCurve = createCosCurve(amplitude, frequency);
      updateFunctionText();

      // VR UI Canvas Panel
      let vrUiMesh;
      const vrUiCanvas = document.createElement('canvas');
      vrUiCanvas.width = 512;
      vrUiCanvas.height = 512;
      const vrUiCtx = vrUiCanvas.getContext('2d');
      const vrUiTexture = new THREE.CanvasTexture(vrUiCanvas);

      const hitBoxes = {
        sliderA:  { x: 40, y: 110, w: 432, h: 35, min: -5, max: 5, type: 'slider', key: 'A' },
        sliderB:  { x: 40, y: 190, w: 432, h: 35, min: 0, max: 5, type: 'slider', key: 'B' },
        btnUp:    { x: 236, y: 325, w: 40, h: 34, type: 'btn', action: 'camUp' },
        btnDown:  { x: 236, y: 405, w: 40, h: 34, type: 'btn', action: 'camDown' },
        btnLeft:  { x: 186, y: 365, w: 40, h: 34, type: 'btn', action: 'camLeft' },
        btnRight: { x: 286, y: 365, w: 40, h: 34, type: 'btn', action: 'camRight' },
        btnZIn:   { x: 346, y: 365, w: 40, h: 34, type: 'btn', action: 'camZIn' },
        btnZOut:  { x: 126, y: 365, w: 40, h: 34, type: 'btn', action: 'camZOut' },
        modeMenu: { x: 40,  y: 460, w: 206, h: 38, type: 'mode', mode: 'menu' }
      };

      function drawVrUi() {
        vrUiCtx.fillStyle = '#0a0e18';
        vrUiCtx.fillRect(0, 0, 512, 512);
        
        // Purple border
        vrUiCtx.strokeStyle = '#8b5cf6';
        vrUiCtx.lineWidth = 6;
        vrUiCtx.strokeRect(3, 3, 506, 506);

        // Title
        vrUiCtx.fillStyle = '#a78bfa';
        vrUiCtx.font = 'bold 24px sans-serif';
        vrUiCtx.fillText('Cos Plot XR', 40, 50);

        // Decoration line
        vrUiCtx.fillStyle = '#8b5cf6';
        vrUiCtx.fillRect(40, 65, 432, 2);

        // Slider A label
        vrUiCtx.fillStyle = '#c084fc';
        vrUiCtx.font = '16px monospace';
        vrUiCtx.fillText(`Amplitudine A: ${amplitude.toFixed(2)}`, 40, 100);
        drawCanvasSlider(hitBoxes.sliderA, amplitude, '#c084fc');

        // Slider B label
        vrUiCtx.fillStyle = '#22c55e';
        vrUiCtx.fillText(`Frequenza B: ${frequency.toFixed(2)}`, 40, 180);
        drawCanvasSlider(hitBoxes.sliderB, frequency, '#22c55e');

        // Formula display
        vrUiCtx.fillStyle = '#a78bfa';
        vrUiCtx.font = 'italic 14px monospace';
        vrUiCtx.fillText(`y = ${amplitude.toFixed(2)} · cos(${frequency.toFixed(2)} · x)`, 40, 250);

        // Camera controls label
        vrUiCtx.fillStyle = 'rgba(167, 139, 250, 0.7)';
        vrUiCtx.font = 'bold 12px sans-serif';
        vrUiCtx.fillText('CAMERA CONTROL X / Y / Z', 40, 318);

        drawCanvasBtn(hitBoxes.btnUp, '▲');
        drawCanvasBtn(hitBoxes.btnDown, '▼');
        drawCanvasBtn(hitBoxes.btnLeft, '◀');
        drawCanvasBtn(hitBoxes.btnRight, '▶');
        drawCanvasBtn(hitBoxes.btnZIn, '＋');
        drawCanvasBtn(hitBoxes.btnZOut, '─');
        vrUiCtx.fillStyle = '#22c55e';
        vrUiCtx.font = '22px sans-serif';
        vrUiCtx.fillText('📷', 243, 390);

        drawModeBtn(hitBoxes.modeMenu, 'SBLOCCA MENU', activeDragMode === 'menu');

        vrUiTexture.needsUpdate = true;
      }

      function drawCanvasSlider(box, val, color) {
        vrUiCtx.fillStyle = 'rgba(30, 40, 70, 0.6)';
        vrUiCtx.fillRect(box.x, box.y + 14, box.w, 6);
        const pct = (val - box.min) / (box.max - box.min);
        vrUiCtx.fillStyle = color;
        vrUiCtx.fillRect(box.x, box.y + 14, box.w * pct, 6);
        vrUiCtx.fillStyle = '#ffffff';
        vrUiCtx.beginPath();
        vrUiCtx.arc(box.x + (box.w * pct), box.y + 17, 9, 0, Math.PI * 2);
        vrUiCtx.fill();
      }

      function drawCanvasBtn(box, text) {
        vrUiCtx.fillStyle = 'rgba(59, 130, 246, 0.15)';
        vrUiCtx.fillRect(box.x, box.y, box.w, box.h);
        vrUiCtx.strokeStyle = '#3b82f6';
        vrUiCtx.lineWidth = 1.5;
        vrUiCtx.strokeRect(box.x, box.y, box.w, box.h);
        vrUiCtx.fillStyle = '#60a5fa';
        vrUiCtx.font = 'bold 16px sans-serif';
        vrUiCtx.fillText(text, box.x + 12, box.y + 23);
      }

      function drawModeBtn(box, text, isUnlocked) {
        vrUiCtx.fillStyle = isUnlocked ? 'rgba(34, 197, 94, 0.2)' : 'rgba(139, 92, 246, 0.08)';
        vrUiCtx.fillRect(box.x, box.y, box.w, box.h);
        vrUiCtx.strokeStyle = isUnlocked ? '#22c55e' : '#8b5cf6';
        vrUiCtx.lineWidth = 2;
        vrUiCtx.strokeRect(box.x, box.y, box.w, box.h);
        vrUiCtx.fillStyle = isUnlocked ? '#34d399' : '#a78bfa';
        vrUiCtx.font = 'bold 13px sans-serif';
        vrUiCtx.fillText(text, box.x + 20, box.y + 24);
      }

      const vrUiGeo = new THREE.PlaneGeometry(1.25, 1.25);
      const vrUiMat = new THREE.MeshBasicMaterial({ map: vrUiTexture, side: THREE.DoubleSide, transparent: true , depthTest: false });
      vrUiMesh = new THREE.Mesh(vrUiGeo, vrUiMat);
      vrUiMesh.position.set(-1.1, 1.35, -0.5);
      vrUiMesh.rotation.y = 0.35;
      scene.add(vrUiMesh);

      const aSlider = document.getElementById('aSlider');
      const aValue = document.getElementById('aValue');
      aSlider.addEventListener('input', onSliderChange);
      const bSlider = document.getElementById('bSlider');
      const bValue = document.getElementById('bValue');
      bSlider.addEventListener('input', onSliderChange);

      document.getElementById('camUp').addEventListener('click', () => { playerRig.position.y += 0.15; });
      document.getElementById('camDown').addEventListener('click', () => { playerRig.position.y -= 0.15; });
      document.getElementById('camLeft').addEventListener('click', () => { playerRig.position.x -= 0.15; });
      document.getElementById('camRight').addEventListener('click', () => { playerRig.position.x += 0.15; });
      document.getElementById('camZIn').addEventListener('click', () => { playerRig.position.z -= 0.15; });
      document.getElementById('camZOut').addEventListener('click', () => { playerRig.position.z += 0.15; });

      function toggleDragMode(mode, btnEl) {
        if (activeDragMode === mode) {
          activeDragMode = null;
          btnEl.classList.remove('active');
        } else {
          activeDragMode = mode;
          btnEl.classList.add('active');
        }
        drawVrUi();
      }

      const controllers = [createController(0), createController(1)];
      controllers.forEach((controller) => playerRig.add(controller));

      const raycaster = new THREE.Raycaster();
      const tempMatrix = new THREE.Matrix4();
      let selectedController = null;
      let draggingUi = false;
      let activeSlider = null;
      const uiStartPos = new THREE.Vector3();
      const controllerUiStartPos = new THREE.Vector3();
      const controllerStartQuat = new THREE.Quaternion();
      const axesStartQuat = new THREE.Quaternion();
      const controllerStartPos = new THREE.Vector3();
      const axesStartPos = new THREE.Vector3();

      window.addEventListener('resize', onWindowResize);
      renderer.setAnimationLoop(render);

      function onSliderChange(event) {
        amplitude = parseFloat(aSlider.value);
        frequency = parseFloat(bSlider.value);
        aValue.textContent = amplitude.toFixed(2);
        bValue.textContent = frequency.toFixed(2);
        updateCosCurve();
        updateFunctionText();
        drawVrUi();
      }

      function updateCosCurve() {
        if (cosCurve) {
          axesGroup.remove(cosCurve);
        }
        cosCurve = createCosCurve(amplitude, frequency);
      }

      function createAxes() {
        const material = new THREE.MeshStandardMaterial({ color: 0x88c8ff, roughness: 0.3, metalness: 0.2 });
        const length = 3.0;
        const thickness = 0.03;

        const xAxis = new THREE.Mesh(new THREE.CylinderGeometry(thickness, thickness, length, 12), material);
        xAxis.rotation.z = -Math.PI / 2;
        xAxis.position.x = length / 2;
        axesGroup.add(xAxis);

        const yAxis = new THREE.Mesh(new THREE.CylinderGeometry(thickness, thickness, length, 12), material);
        yAxis.position.y = length / 2;
        axesGroup.add(yAxis);

        const zAxis = new THREE.Mesh(new THREE.CylinderGeometry(thickness, thickness, length, 12), material);
        zAxis.rotation.x = Math.PI / 2;
        zAxis.position.z = length / 2;
        axesGroup.add(zAxis);

        const arrow = new THREE.ConeGeometry(0.08, 0.26, 16);
        const xArrow = new THREE.Mesh(arrow, material);
        xArrow.rotation.z = -Math.PI / 2;
        xArrow.position.set(length, 0, 0);
        axesGroup.add(xArrow);

        const yArrow = new THREE.Mesh(arrow, material);
        yArrow.position.set(0, length, 0);
        axesGroup.add(yArrow);

        const zArrow = new THREE.Mesh(arrow, material);
        zArrow.rotation.x = Math.PI / 2;
        zArrow.position.set(0, 0, length);
        axesGroup.add(zArrow);

        axesGroup.add(createLabel('X', length + 0.2, 0, 0));
        axesGroup.add(createLabel('Y', 0, length + 0.2, 0));
        axesGroup.add(createLabel('Z', 0, 0, length + 0.2));
      }

      function createLabel(text, x, y, z) {
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'rgba(5, 9, 24, 0.0)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = 'bold 70px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#ccf6ff';
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);

        const texture = new THREE.CanvasTexture(canvas);
        texture.encoding = THREE.sRGBEncoding;

        const label = new THREE.Mesh(
          new THREE.PlaneGeometry(0.4, 0.2),
          new THREE.MeshBasicMaterial({ map: texture, transparent: true })
        );
        label.position.set(x, y, z);
        label.lookAt(camera.position);
        return label;
      }

      function createCosCurve(A, B) {
        const points = [];
        const start = -Math.PI * 4;
        const end = Math.PI * 4;
        const step = 0.08;
        for (let x = start; x <= end; x += step) {
          points.push(new THREE.Vector3(x * 0.28, A * Math.cos(B * x) * 0.7, 0));
        }

        const curveGeometry = new THREE.BufferGeometry().setFromPoints(points);
        const curveMaterial = new THREE.LineBasicMaterial({ color: 0xffd568, linewidth: 2 });
        const curve = new THREE.Line(curveGeometry, curveMaterial);
        curve.position.y = 0.02;
        axesGroup.add(curve);
        return curve;
      }

      function createController(index) {
        const controller = renderer.xr.getController(index);
        controller.addEventListener('selectstart', onSelectStart);
        controller.addEventListener('selectend', onSelectEnd);

        const ray = new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, -1)]),
          new THREE.LineBasicMaterial({ color: 0x88c8ff })
        );
        ray.name = 'ray';
        ray.scale.z = 6;
        controller.add(ray);

        const pointer = new THREE.Mesh(
          new THREE.SphereGeometry(0.015, 16, 12),
          new THREE.MeshBasicMaterial({ color: 0x88c8ff, opacity: 0.9, transparent: true })
        );
        pointer.position.set(0, 0, -1);
        controller.add(pointer);

        return controller;
      }

      function onSelectStart(event) {
        const controller = event.target;
        const uiHit = getUiIntersection(controller);
        if (uiHit && uiHit.uv) {
          const uv = uiHit.uv;
          const x = uv.x * 512;
          const y = (1 - uv.y) * 512;
          for (const key in hitBoxes) {
            const box = hitBoxes[key];
            const inside =
              x >= box.x &&
              x <= box.x + box.w &&
              y >= box.y &&
              y <= box.y + box.h;
            if (!inside) continue;
            if (box.type === 'slider') {
              activeSlider = {
                controller,
                box
              };
              updateSliderFromPosition(box, x);
              return;
            }
            handleVrUiInteraction(x, y, controller);
            if (activeDragMode === 'menu') {
              draggingUi = true;
              selectedController = controller;
              uiStartPos.copy(vrUiMesh.position);
              controllerUiStartPos.setFromMatrixPosition(
                controller.matrixWorld
              );
            } 
            return;
          }
        }
      }

      function onSelectEnd() {
        draggingUi = false;
        selectedController = null;
        activeSlider = null;
        activeDragMode = null;
        drawVrUi();
      }

      function handleVrUiInteraction(x, y, controller) {
        for (const key in hitBoxes) {
          const box = hitBoxes[key];
          const inside =
            x >= box.x &&
            x <= box.x + box.w &&
            y >= box.y &&
            y <= box.y + box.h;
          if (!inside) continue;
          if (box.type === 'slider') {
            const pct = (x - box.x) / box.w;
            const value = box.min + pct * (box.max - box.min);
            if (box.key === 'A') {
              amplitude = value;
              aSlider.value = value;
              aValue.textContent = value.toFixed(2);
            }
            if (box.key === 'B') {
              frequency = value;
              bSlider.value = value;
              bValue.textContent = value.toFixed(2);
            }
            updateCosCurve();
            updateFunctionText();
            drawVrUi();
            return;
          }
          if (box.type === 'btn') {
            switch (box.action) {
              case 'camUp':
                playerRig.position.y += 0.15;
                break;
              case 'camDown':
                playerRig.position.y -= 0.15;
                break;
              case 'camLeft':
                playerRig.position.x -= 0.15;
                break;
              case 'camRight':
                playerRig.position.x += 0.15;
                break;
              case 'camZIn':
                playerRig.position.z -= 0.15;
                break;
              case 'camZOut':
                playerRig.position.z += 0.15;
                break;
            }
            return;
          }
          if (box.type === 'mode' && box.mode === 'menu') {
            draggingUi = true;
            selectedController = controller;
            uiStartPos.copy(vrUiMesh.position);
            controllerUiStartPos.setFromMatrixPosition(controller.matrixWorld);
            activeDragMode = 'menu';
            drawVrUi();
            return;
          }
        }
      }

      function updateSliderFromPosition(box, x) {
        const pct = THREE.MathUtils.clamp(
          (x - box.x) / box.w,
          0,
          1
        );
        const value =
          box.min + pct * (box.max - box.min);
        if (box.key === 'A') {
          amplitude = value;
          aSlider.value = value;
          aValue.textContent = value.toFixed(2);
        }
        if (box.key === 'B') {
          frequency = value;
          bSlider.value = value;
          bValue.textContent = value.toFixed(2);
        }
        updateCosCurve();
        updateFunctionText();
        drawVrUi();
      }

      function getControllerIntersections(controller) {
        tempMatrix.identity().extractRotation(controller.matrixWorld);
        raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
        raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
        return raycaster.intersectObjects(axesGroup.children, true);
      }

      function getUiIntersection(controller) {
        tempMatrix.identity().extractRotation(controller.matrixWorld);

        raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
        raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

        const hits = raycaster.intersectObject(vrUiMesh);

        if (hits.length === 0) return null;

        return hits[0];
      }

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      function render() {
        controllers.forEach(controller => {
          const uiHit = getUiIntersection(controller);
          const ray = controller.getObjectByName('ray');
          if (uiHit) {
            ray.material.color.set(0x22ff88);
          } else {
            ray.material.color.set(0x88c8ff);
          }
        });
        if (activeSlider) {
          const hit = getUiIntersection(activeSlider.controller);
          if (hit && hit.uv) {
            const x = hit.uv.x * 512;
            updateSliderFromPosition(
              activeSlider.box,
              x
            );
          }
        }
        if (draggingUi && selectedController) {
          const currentPos = new THREE.Vector3()
            .setFromMatrixPosition(selectedController.matrixWorld);
          const delta = currentPos.clone()
            .sub(controllerUiStartPos);
          vrUiMesh.position.copy(uiStartPos).add(delta);
        }
        renderer.render(scene, camera);
      }

      function updateFunctionText() {
        const el = document.getElementById('functionDisplay');
        if (el) {
          el.textContent = amplitude.toFixed(2);
        }
        const el2 = document.getElementById('frequencyDisplay');
        if (el2) {
          el2.textContent = frequency.toFixed(2);
        }
      }

      // Initial draw
      drawVrUi();
    </script>
  </body>
</html>

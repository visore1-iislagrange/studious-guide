
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <title>Chronos SPQR | Linea del Tempo VR</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            background: #050508; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }
        .hero { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: radial-gradient(circle at center, #e90f8e 0%, #eb09e4 100%); 
        }
        h1 { 
            font-family: 'Cinzel', serif; 
            font-size: 4rem; 
            color: #00fff0; 
            margin: 0; 
            letter-spacing: 6px; 
            text-shadow: 0 0 30px rgba(0, 255, 240, 0.4); 
            text-align: center;
        }
        .subtitle {
            font-family: 'Cinzel', serif;
            color: #8e9bb0;
            letter-spacing: 3px;
            margin-top: 10px;
            font-size: 1.1rem;
        }
        p { 
            font-size: 1.1rem; 
            color: #a2aab8; 
            max-width: 600px; 
            text-align: center; 
            line-height: 1.8; 
            margin-top: 25px;
        }
        .cta-container { margin-top: 40px; }
        .btn { 
            padding: 16px 40px; 
            border-radius: 0px; 
            text-decoration: none; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            transition: all 0.3s ease; 
            border: 2px solid #00fff0; 
            background: transparent; 
            color: #00fff0;
        }
        .btn:hover { 
            background: #00fff0; 
            color: #d8d8f6;
            box-shadow: 0 0 30px rgba(0, 255, 240, 0.6); 
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>CHRONOS S.P.Q.R.</h1>
        <div class="subtitle">Attraverso lo Spazio-Tempo Romano</div>
        <p>Cammina su una passerella sospesa nel vuoto cosmico della storia. Attraversa i portali temporali e scopri l'evoluzione di Roma dalla fondazione fino al tramonto dell'Impero.</p>
        <div class="cta-container">
            <a href="index.html" class="btn">Avvia il Viaggio nel Tempo</a>
        </div>
    </div>
</body>
</html>

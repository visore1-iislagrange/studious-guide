<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <title>ROMA VR | Esperienza Immersiva</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <style>
        #sketchfab-iframe {
            position: absolute;
            right: 20px;
            top: 20px;
            width: 420px;
            height: 315px;
            border: 3px solid #d4af37;
            border-radius: 12px;
            background: #000;
            z-index: 10;
        }
        #model-hint {
            position: absolute;
            right: 20px;
            top: 345px;
            width: 420px;
            color: #d4af37;
            font-family: sans-serif;
            font-size: 0.95rem;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <iframe id="sketchfab-iframe" title="Giulio Cesare 3D" src="https://sketchfab.com/models/035094003cc743678940ff2bc1da7f0f/embed?autostart=1&internal=1&tracking=0&ui_ar=0&ui_infos=0&ui_snapshots=1&ui_stop=0&ui_theatre=1&ui_watermark=0" allow="autoplay; fullscreen; vr; xr-spatial-tracking"></iframe>
    <div id="model-hint">Clicca sul modello per visualizzare le informazioni su Giulio Cesare.</div>
    <a-scene fog="type: exponential; color: #1a1a1a; density: 0.05;">
        <a-assets>
            <img id="sky" src="https://i.imgur.com/39VlU9E.jpg">
        </a-assets>

        <a-entity environment="preset: goldmine; ground: canyon; skyType: gradient; lighting: distant;"></a-entity>

        <a-entity id="rig" movement-controls="speed: 0.2">
            <a-entity camera position="0 1.6 0" look-controls>
                <a-cursor color="#d4af37"></a-cursor>
            </a-entity>
        </a-entity>

        <a-entity position="0 0 -5">
            <a-box width="10" height="0.5" depth="10" color="#2c3e50"></a-box>
            <a-text value="GIULIO CESARE" align="center" position="0 2.5 0" color="#d4af37" width="8" font="https://cdn.aframe.io/fonts/Cinzel.fnt"></a-text>
            <a-plane position="0 1.5 0.5" width="3" height="1" color="#000" opacity="0.8">
                <a-text value="Veni, Vidi, Vici.\nEntra nella storia." align="center" width="2.5"></a-text>
            </a-plane>
            <a-entity id="caesar-model" position="0 0.8 0.6">
                <a-box width="4" height="4" depth="0.1" color="#111" opacity="0.45" class="clickable"></a-box>
                <a-text value="MODELLO 3D" align="center" position="0 1.2 0.06" width="3" color="#d4af37"></a-text>
                <a-text value="Clicca qui oppure sul modello Sketchfab" align="center" position="0 0.6 0.06" width="3.5" color="#fff"></a-text>
            </a-entity>
            <a-plane id="cesare-info" position="0 0.8 1.1" width="4.5" height="2.2" color="#000" opacity="0.85" visible="false">
                <a-text value="Gaius Iulius Caesar\n63 a.C. - 44 a.C.\nGenerale romano, politico e scrittore.\nHa trasformato la Repubblica in un impero e ha ampliato i confini di Roma." align="center" width="4" color="#fff" position="0 0 0.01"></a-text>
            </a-plane>
        </a-entity>

        <a-entity position="-3 1.5 -2" rotation="0 45 0">
            <a-box width="1.5" height="0.6" depth="0.1" color="#d4af37" class="clickable" onclick="window.location.href='roman--empire.html'">
                <a-text value="TORNA ALLA MAPPA" align="center" color="#000" width="3"></a-text>
            </a-box>
        </a-entity>
    </a-scene>
    <script>
        const caesarModel = document.querySelector('#caesar-model');
        const modelFrame = document.querySelector('#sketchfab-iframe');
        const infoPanel = document.querySelector('#cesare-info');

        function toggleInfo() {
            if (!infoPanel) return;
            const visible = infoPanel.getAttribute('visible');
            infoPanel.setAttribute('visible', !visible);
        }

        if (caesarModel) {
            caesarModel.addEventListener('click', toggleInfo);
        }

        if (modelFrame) {
            modelFrame.addEventListener('click', toggleInfo);
        }
    </script>
</body>
</html>

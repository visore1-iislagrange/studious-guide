<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebXR Starter Template</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #050a18;
        color: #f4f8ff;
        font-family: system-ui, sans-serif;
      }

      #info {
        position: absolute;
        left: 1.2rem;
        right: 1.2rem;
        top: 1.2rem;
        z-index: 10;
        padding: 1.2rem 1.4rem;
        background: rgba(2, 8, 25, 0.75);
        border: 1px solid rgba(136, 200, 255, 0.12);
        border-radius: 1rem;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        line-height: 1.6;
        font-size: 0.95rem;
        max-width: 480px;
      }

      #info strong {
        display: block;
        margin-bottom: 0.3rem;
        font-size: 1.15rem;
        font-weight: 800;
        letter-spacing: -0.01em;
        background: linear-gradient(90deg, #88c8ff, #c4a3ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      #info p {
        margin: 0;
        color: rgba(244, 248, 255, 0.65);
        font-size: 0.88rem;
        line-height: 1.6;
      }

      #info .hint {
        margin-top: 0.75rem;
        padding: 0.6rem 0.8rem;
        background: rgba(136, 200, 255, 0.06);
        border: 1px solid rgba(136, 200, 255, 0.1);
        border-radius: 0.5rem;
        font-family: monospace;
        font-size: 0.75rem;
        color: rgba(244, 248, 255, 0.45);
        line-height: 1.7;
      }

      #info .hint span {
        color: #88c8ff;
        font-weight: 700;
      }

      /* Exit VR button */
      #exitVRBtn {
        position: absolute;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
        display: none;
        padding: 0.65rem 1.6rem;
        background: rgba(2, 8, 25, 0.85);
        border: 1px solid rgba(255, 100, 100, 0.35);
        border-radius: 2rem;
        color: #ff8888;
        font-family: system-ui, sans-serif;
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        cursor: pointer;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        transition: background 0.2s, border-color 0.2s, color 0.2s;
      }

      #exitVRBtn:hover {
        background: rgba(255, 80, 80, 0.15);
        border-color: rgba(255, 100, 100, 0.7);
        color: #ffaaaa;
      }

      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="info">
      <strong>WebXR Starter Template</strong>
      <p>This is a WebXR template to start building your immersive dreams.</p>
      <div class="hint">
        <span>L stick</span> — move camera · <span>R stick</span> — look around<br>
        <span>Trigger</span> — interact · <span>Exit VR</span> — leave session
      </div>
    </div>

    <button id="exitVRBtn">✕ Exit VR</button>

    <script type="importmap">
    {
      "imports": {
        "three": "../vendor/three/build/three.module.js"
      }
    }
    </script>
    <script type="text/javascript">
    window.randomColor = '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
    console.log(`%crandomColor: ${randomColor}`, `color: ${randomColor};`);

    let socket;

    function wsConnect() {
      let wsUrl;

      // Dynamic routing evaluation
      if (window.location.hostname === 'aab016.github.io') {
        wsUrl = 'wss://studious-guide-bjbn.onrender.com/';
      } else {
        // Calculate the proxy URL for port 3000 in local Codespaces
        const targetHostname = window.location.hostname.replace('-5500', '-3000');
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        wsUrl = `${wsProtocol}//${targetHostname}`;
      }
      
      console.log("WSS Target URL:", wsUrl);
      
      // Instantiate native browser WebSocket
      socket = new WebSocket(wsUrl);

      socket.onopen = () => {
        console.log("socket.onopen");
      };

      socket.onmessage = (event) => {
        try {
          const packet = JSON.parse(event.data);
          console.log("Got message", packet);
          // Handle the custom events we expect from the network
          if (packet.event === 'onDXControllerSelect') {
            window.pulseCubeInvoker(0, packet.data);
          }

          // NEW: Handle incoming remote camera movements
          if (packet.event === 'camera_move') {
            if (window.handleRemoteCameraMove) {
              window.handleRemoteCameraMove(packet.data);
            }
          }
        } catch (err) {
          console.error("Error parsing incoming message:", err);
        }
      };

      socket.onerror = (error) => {
        console.error("WebSocket Error:", error);
      };

      socket.onclose = () => {
        console.log("%c[WS Closed] Connection lost. Reconnecting in 3s...", "color: #ff8888;");
        setTimeout(wsConnect, 3000); // Simple auto-reconnect loop
      };

      // 3. Define the invoker helper for the Three.js module to call
      window.emitInvoker = function(eventName, payloadData = '') {
        console.log("emitInvoker", eventName, payloadData)
        if (socket && socket.readyState === WebSocket.OPEN) {
          // Packets must be strings over basic WebSockets
          const packet = JSON.stringify({ event: eventName, data: payloadData });
          socket.send(packet);
        } else {
          console.warn("Cannot send message, WebSocket is not open.");
        }
      };
    }

    // Fire connection immediately
    wsConnect();
    </script>
    <script type="module">
      import * as THREE from '../vendor/three/build/three.module.js';
      import { VRButton } from '../vendor/three/examples/jsm/webxr/VRButton.js';

      // ─── Renderer ────────────────────────────────────────────────────────────
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      renderer.xr.setReferenceSpaceType('local');
      document.body.appendChild(renderer.domElement);
      document.body.appendChild(VRButton.createButton(renderer));

      // ─── Exit VR button ──────────────────────────────────────────────────────
      const exitVRBtn = document.getElementById('exitVRBtn');
      exitVRBtn.addEventListener('click', () => {
        if (renderer.xr.isPresenting) {
          renderer.xr.getSession().end();
        }
      });

      renderer.xr.addEventListener('sessionstart', () => {
        exitVRBtn.style.display = 'block';
      });
      renderer.xr.addEventListener('sessionend', () => {
        exitVRBtn.style.display = 'none';
      });

      // ─── Scene ───────────────────────────────────────────────────────────────
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050a18);
      scene.fog = new THREE.FogExp2(0x050a18, 0.045);

      // ─── Camera ──────────────────────────────────────────────────────────────
      const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 200);
      camera.position.set(0, 1.6, 4);
      scene.add(camera);

      // ─── HUD Setup (Attached to Camera) ──────────────────────────────────────
      const oculus_id = localStorage.getItem('oculus_id');
      const oculus_alias = localStorage.getItem('oculus_alias');

      // Create a 2D canvas to draw the text
      const hudCanvas = document.createElement('canvas');
      hudCanvas.width = 512;
      hudCanvas.height = 128;
      const ctx = hudCanvas.getContext('2d');

      // Draw semi-transparent background box
      ctx.fillStyle = 'rgba(5, 10, 24, 0.5)'; // Dark, 50% opacity
      ctx.beginPath();
      ctx.roundRect(0, 0, 512, 128, 16);
      ctx.fill();

      // Configure text properties
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';

      // Draw text based on login state
      if (oculus_id && oculus_alias) {
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 36px system-ui, sans-serif';
        ctx.fillText(oculus_alias, 480, 48);
        
        ctx.fillStyle = '#88c8ff';
        ctx.font = '24px monospace';
        ctx.fillText(`${oculus_id}`, 480, 92);
      } else {
        ctx.fillStyle = '#ffaaaa';
        ctx.font = '28px system-ui, sans-serif';
        ctx.fillText("Vai in home page per login", 480, 64);
      }

      // Convert canvas to a Three.js Texture
      const hudTexture = new THREE.CanvasTexture(hudCanvas);
      // Ensure the texture maps nicely
      hudTexture.minFilter = THREE.LinearFilter;
      
      const hudMaterial = new THREE.MeshBasicMaterial({ 
        map: hudTexture, 
        transparent: true, 
        opacity: 0.85,
        depthTest: false, // Ensures it renders ON TOP of everything
        depthWrite: false
      });

      // Create a small plane and position it relative to the camera
      const hudPlane = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.1), hudMaterial);
      // X = Right (+), Y = Up (+), Z = Forward (-)
      hudPlane.position.set(0.3, 0.22, -0.7); 
      hudPlane.renderOrder = 999; // Force top rendering priority
      camera.add(hudPlane); // Attach to camera so it moves with the user's head



      // ─── Multiplayer Remote Players ──────────────────────────────────────────
      // Store remote player meshes and timestamps
      const remotePlayers = {};

      window.handleRemoteCameraMove = function(payload) {
        const { oculus_alias: remote_oculus_alias, oculus_id: remote_oculus_id, coordinates, timestamp } = payload;

        // 1. Ignore our own movement broadcasts
        if (remote_oculus_id === oculus_id) return;

        // 2. Check if we already have a panel for this user
        if (!remotePlayers[remote_oculus_id]) {
          // --- First time seeing this user: Create the light panel ---
          
          const canvas = document.createElement('canvas');
          canvas.width = 512;
          canvas.height = 128;
          const context = canvas.getContext('2d');

          // Draw panel background (similar to HUD style)
          context.fillStyle = 'rgba(2, 8, 25, 0.85)';
          context.beginPath();
          context.roundRect(0, 0, 512, 128, 16);
          context.fill();
          
          // Border
          context.strokeStyle = 'rgba(136, 200, 255, 0.4)';
          context.lineWidth = 4;
          context.stroke();

          // Text setup
          context.textAlign = 'center';
          context.textBaseline = 'middle';
          
          // Alias
          context.fillStyle = '#ffffff';
          context.font = 'bold 36px system-ui, sans-serif';
          context.fillText(remote_oculus_alias, 256, 48);
          
          // ID
          context.fillStyle = '#88c8ff';
          context.font = '24px monospace';
          context.fillText(remote_oculus_id, 256, 92);

          // Create Texture and Material
          const texture = new THREE.CanvasTexture(canvas);
          texture.minFilter = THREE.LinearFilter;
          
          // Sprites are ideal because they always face the local camera
          const material = new THREE.SpriteMaterial({ 
            map: texture, 
            transparent: true,
            depthTest: false // Ensures we can see players through walls/objects if desired
          });
          
          const sprite = new THREE.Sprite(material);
          // Scale it to respect the 512x128 aspect ratio (4:1)
          sprite.scale.set(1.6, 0.4, 1); 
          
          // Position it exactly at the coordinates of the message
          sprite.position.set(coordinates.x, coordinates.y, coordinates.z);
          
          scene.add(sprite);

          // Store reference and initial timestamp
          remotePlayers[remote_oculus_id] = {
            mesh: sprite,
            timestamp: timestamp
          };

          console.log(`[Multiplayer] Created panel for ${remote_oculus_id}`);

        } else {
          // --- Existing user: Update position if timestamp is newer ---
          
          const playerState = remotePlayers[remote_oculus_id];
          
          if (timestamp > playerState.timestamp) {
            // Update timestamp
            playerState.timestamp = timestamp;
            
            // Update position
            playerState.mesh.position.set(
              coordinates.x, 
              coordinates.y, 
              coordinates.z
            );
          }
        }
      };



      // ─── Controllers ─────────────────────────────────────────────────────────
      // Controllers live in the scene; the XR runtime positions them correctly
      const controller0 = renderer.xr.getController(0);
      const controller1 = renderer.xr.getController(1);
      scene.add(controller0);
      scene.add(controller1);

      function onDXControllerSelect(evt) {
        const ctrl = evt.target;   // the controller object
        window.emitInvoker('onDXControllerSelect', window.randomColor)
      }
      controller0.addEventListener('selectstart', onDXControllerSelect);

      // ─── Lights ──────────────────────────────────────────────────────────────
      scene.add(new THREE.HemisphereLight(0xffffff, 0x101825, 0.8));
      const sun = new THREE.DirectionalLight(0xffffff, 0.9);
      sun.position.set(5, 10, 5);
      scene.add(sun);

      // ─── Environment ─────────────────────────────────────────────────────────
      // Floor
      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(40, 40),
        new THREE.MeshStandardMaterial({ color: 0x081025, roughness: 0.95, metalness: 0.05 })
      );
      floor.rotation.x = -Math.PI / 2;
      scene.add(floor);

      // Grid
      const grid = new THREE.GridHelper(40, 40, 0x1a3a5c, 0x0d1e35);
      grid.position.y = 0.001;
      scene.add(grid);

      // Decorative floating orbs
      const orbColors = [0x88c8ff, 0xc4a3ff, 0x68e8b0, 0xffd568];
      for (let i = 0; i < 12; i++) {
        const r = 0.08 + Math.random() * 0.18;
        const baseColor = orbColors[i % orbColors.length];
        const orb = new THREE.Mesh(
          new THREE.SphereGeometry(r, 20, 16),
          new THREE.MeshStandardMaterial({
            color: baseColor,
            roughness: 0.15,
            metalness: 0.8,
            emissive: baseColor,
            emissiveIntensity: 0.25
          })
        );
        orb.position.set(
          (Math.random() - 0.5) * 14,
          1 + Math.random() * 3,
          (Math.random() - 0.5) * 14
        );
        orb.userData.floatOffset = Math.random() * Math.PI * 2;
        orb.userData.floatSpeed  = 0.3 + Math.random() * 0.5;
        orb.userData.baseColor   = baseColor;
        orb.userData.hovered     = false;
        scene.add(orb);
      }

      // Collect orbs for animation and raycasting
      const orbs = scene.children.filter(c => c.userData.floatOffset !== undefined);

      // Reusable raycaster for hover detection
      const rayHover    = new THREE.Raycaster();
      const _rayOrigin  = new THREE.Vector3();
      const _rayDir     = new THREE.Vector3();
      const _tempMat    = new THREE.Matrix4();
      const _lightColor = new THREE.Color();

      window.pulseCubeInvoker = function(i, color) {
        console.warn("pulseCubeInvoker NOT IMPLEMENTED")
      }

      // ─── Controller ray visuals ───────────────────────────────────────────────
      function buildControllerRay(controller) {
        // Ray line
        const rayGeom = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(0, 0, 0),
          new THREE.Vector3(0, 0, -1)
        ]);
        const ray = new THREE.Line(
          rayGeom,
          new THREE.LineBasicMaterial({ color: 0x88c8ff, opacity: 0.65, transparent: true })
        );
        ray.name = 'ray';
        ray.scale.z = 10;
        controller.add(ray);

        // Dot at ray tip
        const dot = new THREE.Mesh(
          new THREE.SphereGeometry(0.012, 12, 10),
          new THREE.MeshBasicMaterial({ color: 0xffffff, opacity: 0.8, transparent: true })
        );
        dot.position.set(0, 0, -1);
        dot.name = 'rayDot';
        controller.add(dot);

        // Controller body
        const body = new THREE.Mesh(
          new THREE.CylinderGeometry(0.018, 0.028, 0.14, 16),
          new THREE.MeshStandardMaterial({ color: 0x1a3a5c, roughness: 0.4, metalness: 0.7 })
        );
        body.rotation.x = Math.PI / 2;
        controller.add(body);
      }

      buildControllerRay(controller0);
      buildControllerRay(controller1);

      // ─── Orb hover via raycasts ───────────────────────────────────────────────
      function checkOrbHover() {
        // Collect all hit orbs from both controllers this frame
        const hitOrbs = new Set();

        for (const ctrl of [controller0, controller1]) {
          if (!ctrl.matrixWorld) continue;
          _tempMat.identity().extractRotation(ctrl.matrixWorld);
          _rayOrigin.setFromMatrixPosition(ctrl.matrixWorld);
          _rayDir.set(0, 0, -1).applyMatrix4(_tempMat);
          rayHover.set(_rayOrigin, _rayDir);

          const hits = rayHover.intersectObjects(orbs, false);
          if (hits.length > 0) hitOrbs.add(hits[0].object);
        }

        // Apply / remove highlight on each orb
        for (const orb of orbs) {
          const mat = orb.material;
          const nowHovered = hitOrbs.has(orb);
          if (nowHovered === orb.userData.hovered) continue; // no change
          orb.userData.hovered = nowHovered;

          if (nowHovered) {
            // Lighten: boost emissive intensity and tint color toward white
            _lightColor.set(orb.userData.baseColor).lerp(new THREE.Color(0xffffff), 0.45);
            mat.color.copy(_lightColor);
            mat.emissive.copy(_lightColor);
            mat.emissiveIntensity = 0.9;
          } else {
            // Restore base appearance
            mat.color.set(orb.userData.baseColor);
            mat.emissive.set(orb.userData.baseColor);
            mat.emissiveIntensity = 0.25;
          }
        }
      }

      // ─── Locomotion via XR reference space offset ────────────────────────────
      // In WebXR the HMD pose is injected directly into the camera by Three.js,
      // so moving the cameraRig or camera has no effect. The correct approach is
      // to accumulate a world-space delta each frame and apply it by rebasing the
      // XR reference space with getOffsetReferenceSpace().

      const MOVE_SPEED = 3.0;
      const LOOK_SPEED = 1.6;
      const DEADZONE   = 0.15;

      // Running world-space offset (meters) and heading (radians)
      let xrOffsetX = 0, xrOffsetY = 0, xrOffsetZ = 0, xrYaw = 0;

      let pendingLocomotionEmit = false; // ── NEW: Track if we need to emit ──

      function applyDeadzone(v) {
        return Math.abs(v) < DEADZONE ? 0 : v;
      }

      function getInputSources() {
        const session = renderer.xr.getSession();
        if (!session) return [null, null];
        const src = Array.from(session.inputSources);
        return [
          src.find(s => s.handedness === 'left')  || null,
          src.find(s => s.handedness === 'right') || null
        ];
      }

      // ─── Resize ──────────────────────────────────────────────────────────────
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // ─── Render loop ─────────────────────────────────────────────────────────
      const clock = new THREE.Clock();

      renderer.setAnimationLoop(() => {
        // ── NEW: Emit coordinates exactly one frame after the movement ──
        if (pendingLocomotionEmit) {
          window.emitInvoker('camera_move', {
            oculus_alias: oculus_alias || 'guest',
            oculus_id: oculus_id || 'unknown_id',
            coordinates: {
              x: camera.position.x,
              y: camera.position.y,
              z: camera.position.z
            },
            timestamp: Date.now()
          });
          pendingLocomotionEmit = false;
        }


        const dt = clock.getDelta();
        const t  = clock.elapsedTime;

        // Float orbs
        orbs.forEach(orb => {
          orb.position.y += Math.sin(t * orb.userData.floatSpeed + orb.userData.floatOffset) * 0.003;
        });

        // ── XR locomotion ─────────────────────────────────────────────────────
        // Moving camera/rig objects doesn't work in WebXR — the HMD pose is
        // written directly by the runtime. Instead we accumulate a delta each
        // frame and rebase the XR reference space origin via getOffsetReferenceSpace.
        const session = renderer.xr.getSession();
        if (session && typeof XRRigidTransform !== 'undefined') {
          const [leftSrc, rightSrc] = getInputSources();
          let dirty = false;

          // XR gamepad thumbstick axes (OpenXR / Quest standard):
          //   axes[2] = stick X,  axes[3] = stick Y
          // (axes[0]/[1] are touchpad axes, usually zero on most headsets)

          // Right stick → turn (yaw) + vertical height
          if (rightSrc?.gamepad) {
            const rx = applyDeadzone(rightSrc.gamepad.axes[2] ?? 0);
            const ry = applyDeadzone(rightSrc.gamepad.axes[3] ?? 0);
            if (rx !== 0) { xrYaw -= rx * LOOK_SPEED * dt; dirty = true; }
            if (ry !== 0) { xrOffsetY -= ry * MOVE_SPEED * dt; dirty = true; }
          }

          // Left stick → translate relative to current heading
          if (leftSrc?.gamepad) {
            const lx = applyDeadzone(leftSrc.gamepad.axes[2] ?? 0);
            const ly = applyDeadzone(leftSrc.gamepad.axes[3] ?? 0);
            if (lx !== 0 || ly !== 0) {
              // Heading: forward = -Z rotated by current yaw
              const sinY = Math.sin(xrYaw), cosY = Math.cos(xrYaw);
              xrOffsetX += ( lx * cosY - ly * sinY) * MOVE_SPEED * dt;
              xrOffsetZ += (-lx * sinY - ly * cosY) * MOVE_SPEED * dt;
              dirty = true;
            }
          }

          if (dirty) {
            // Build an XRRigidTransform from accumulated offset + yaw.
            // getOffsetReferenceSpace() is additive, so we must start from
            // the *original* reference space captured at session start.
            const halfYaw = xrYaw / 2;
            try {
              const xform = new XRRigidTransform(
                { x: xrOffsetX, y: xrOffsetY, z: xrOffsetZ, w: 1 },
                { x: 0, y: Math.sin(halfYaw), z: 0, w: Math.cos(halfYaw) }
              );
              renderer.xr.setReferenceSpace(
                renderer.xr.getReferenceSpace().getOffsetReferenceSpace(xform)
              );

              // ── NEW: Tell the next frame to broadcast the updated position ──
              pendingLocomotionEmit = true;

              // Reset deltas — the new reference space is now the baseline
              xrOffsetX = 0; xrOffsetY = 0; xrOffsetZ = 0; xrYaw = 0;
            } catch(e) { /* XRRigidTransform not yet available, skip */ }
          }
        }

        // Orb hover highlight
        checkOrbHover();

        renderer.render(scene, camera);
      });
    </script>
  </body>
</html>
